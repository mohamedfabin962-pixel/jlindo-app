<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" fill="none">
  <!-- Rounded square background -->
  <rect width="48" height="48" rx="12" fill="url(#brandGrad)"/>
  
  <!-- 
    Clean geometric "J" letterform using paths only (no font dependency).
    The J: vertical stem from top, curves right at bottom left.
    Plus a small rising arrow on the right to signify growth/opportunity.
  -->
  
  <!-- J vertical bar -->
  <rect x="22" y="8" width="7" height="23" rx="3.5" fill="white"/>
  
  <!-- J curve at bottom: the hook -->
  <path d="M22 27 Q22 38 13 38 Q9 38 8 36" stroke="white" stroke-width="5.5" stroke-linecap="round" fill="none"/>
  
  <!-- Right accent: small upward arrow (growth) -->
  <path d="M36 30 L36 18" stroke="rgba(255,255,255,0.65)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M33 21 L36 17.5 L39 21" stroke="rgba(255,255,255,0.65)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <defs>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>
</svg>